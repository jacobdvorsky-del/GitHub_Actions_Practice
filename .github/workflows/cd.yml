# Merge to main → build image → push to GHCR → deploy staging → verify → approve → deploy production.
name: CD - on main Push
on:
  push:
    branches: ['main']

permissions:
  contents: read
  packages: write

concurrency: 
  group: cd-${{ github.ref }}
  cancel-in-progress: false 

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Set lowercase repo
        id: repo
        run: echo "name=${GITHUB_REPOSITORY@L}" >> "$GITHUB_OUTPUT"
      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: | 
            ghcr.io/${{ steps.repo.outputs.name }}/tasks_app:latest
            ghcr.io/${{ steps.repo.outputs.name }}/tasks_app:${{ github.sha }}

  deploy-staging:
    name: Deploy on Staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - build-and-push
    steps:
      - run: echo "Build on staging here." 

  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - deploy-staging
    steps:
      - run: echo "Run pytests here"

  # Manual Approve before deploying on production
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: tests
    steps:
      - run: echo "Deploy on Azure VM here"
      
    
