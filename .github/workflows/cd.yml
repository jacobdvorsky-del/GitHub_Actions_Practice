# Merge to main → build image → push to GHCR → deploy staging → verify → approve → deploy production.
name: CD - on main Push
on:
  push:
    branches: ['main']

permissions:
  contents: read
  packages: write

concurrency: 
  group: cd-${{ github.ref }}
  cancel-in-progress: false 

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Set lowercase repo
        id: repo
        run: echo "name=${GITHUB_REPOSITORY@L}" >> "$GITHUB_OUTPUT"
      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: | 
            ghcr.io/${{ steps.repo.outputs.name }}/tasks_app:latest
            ghcr.io/${{ steps.repo.outputs.name }}/tasks_app:${{ github.sha }}

  deploy-staging: # Refactor later
    name: Deploy on Staging # Is getting docker compose from docker sensitive for changes ? 
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - build-and-push
    steps:
      - name: Execute ssh commands on Staging VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AZURE_HOST_STAGING }}
          username: ${{ secrets.AZURE_USER_STAGING }}
          key: ${{ secrets.AZURE_SSH_KEY_STAGING }}
          script: |
            docker pull ghcr.io/jacobdvorsky-del/github_actions_practice/tasks_app:latest
            docker compose -f https://github.com/jacobdvorsky-del/GitHub_Actions_Practice.git down 
            docker compose -f https://github.com/jacobdvorsky-del/GitHub_Actions_Practice.git up -d &
            wait %1
            curl "http://localhost:50090/health"
        
            
  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - deploy-staging
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14' # Add python version to variable
      - name: Install dependencies
        run: pip install -r tests/requirements.txt
      - name: Run Tests
        run: pytest tests/tests -v --api-url "http://${{ secrets.AZURE_HOST_STAGING }}:50090"

  # Manual Approve before deploying on production
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: tests
    steps:
      - run: echo "Deploy on Azure VM here"
      
    
