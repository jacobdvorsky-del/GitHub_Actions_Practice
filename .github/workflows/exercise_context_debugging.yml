name: exercise - context debugging
on:
  workflow_dispatch:
    inputs:
      name:
        type: string
        required: true
    
permissions:
  contents: read

jobs:
  echo-each-one-with-env-vars:
    runs-on: ubuntu-latest
    steps:
      - run: echo $GITHUB_SHA
      - run: echo $GITHUB_REF
      - run: echo $GITHUB_REF_NAME
      - run: echo $GITHUB_EVENT_NAME
      - run: echo $GITHUB_REPOSITORY
      - run: echo $GITHUB_ACTOR
      - run: echo $GITHUB_RUN_ID
      - run: echo $GITHUB_RUN_NUMBER
      
  echo-each-one-with-github-context:
    runs-on: ubuntu-latest
    steps:
      - run: echo "${{ github.sha }}"
      - run: echo "${{ github.ref }}"
      - run: echo "${{ github.ref_name }}"
      - run: echo "${{ github.event_name }}"
      - run: echo "${{ github.repository }}"
      - run: echo "${{ github.actor }}"
      - run: echo "${{ github.run_id }}"
      - run: echo "${{ github.run_number }}"

  custom-env-variable: # This is redundant, it is just for practice
    runs-on: ubuntu-latest
    steps:
      - name: Set Name
        run: echo "NAME=${{ github.event.inputs.name }}" >> $GITHUB_ENV
      - name: Use Name env context
        run: echo "The name is $NAME"
      - name: Use Name github context
        run: echo "The name is ${{ env.NAME }}"
