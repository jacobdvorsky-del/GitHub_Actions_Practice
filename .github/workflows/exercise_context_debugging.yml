name: exercise - context debugging
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  echo-each-one-with-env-vars:
    runs-on: ubuntu-latest
    steps:
      - run: echo $GITHUB_SHA
      - run: echo $GITHUB_REF
      - run: echo $GITHUB_REF_NAME
      - run: echo $GITHUB_EVENT_NAME
      - run: echo $GITHUB_REPOSITORY
      - run: echo $GITHUB_ACTOR
      - run: echo $GITHUB_RUN_ID
      - run: echo $GITHUB_RUN_NUMBER
  echo-each-one-with-github-context:
    runs-on: ubuntu-latest
    steps:
      - run: echo ${{ github.sha }}
